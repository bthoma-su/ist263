<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Ben Thomas Photography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        nav {
            background-color: #2c3e50;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skeleton {
            background: linear-gradient(90deg, #34495e 25%, #3d566e 50%, #34495e 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 20px;
            margin-bottom: 0.5rem;
        }

        .skeleton-heading {
            height: 32px;
            margin-bottom: 1rem;
            width: 60%;
        }

        .skeleton-nav {
            height: 24px;
            width: 400px;
        }

        .skeleton-logo {
            height: 24px;
            width: 250px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero-skeleton {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 6rem 2rem;
            text-align: center;
            margin-bottom: 2rem;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-skeleton .skeleton {
            height: 48px;
            width: 400px;
        }

        .content {
            background-color: #252525;
            padding: 2.5rem;
            border-radius: 12px;
        }

        .content-block {
            margin-bottom: 2rem;
        }

        .skeleton-paragraph {
            margin-bottom: 1rem;
        }

        .skeleton-paragraph .skeleton-text:last-child {
            width: 80%;
        }

        .skeleton-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .skeleton-image {
            height: 250px;
            border-radius: 8px;
        }

        .skeleton-button {
            height: 56px;
            width: 200px;
            border-radius: 8px;
            margin-top: 1rem;
            display: inline-block;
        }

        footer {
            background-color: #2c3e50;
            color: #e0e0e0;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        .skeleton-footer-text {
            height: 16px;
            width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="skeleton skeleton-logo"></div>
            <div class="skeleton skeleton-nav"></div>
        </div>
    </nav>

    <main>
        <section class="hero-skeleton">
            <div class="skeleton"></div>
        </section>

        <article class="content">
            <div class="content-block">
                <div class="skeleton skeleton-heading"></div>
                <div class="skeleton-paragraph">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
            </div>

            <div class="content-block">
                <div class="skeleton skeleton-heading"></div>
                <div class="skeleton-paragraph">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
            </div>

            <div class="content-block">
                <div class="skeleton skeleton-heading"></div>
                <div class="skeleton-gallery">
                    <div class="skeleton skeleton-image"></div>
                    <div class="skeleton skeleton-image"></div>
                    <div class="skeleton skeleton-image"></div>
                </div>
            </div>

            <div class="content-block">
                <div class="skeleton skeleton-heading"></div>
                <div class="skeleton-paragraph">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
                <div class="skeleton skeleton-button"></div>
            </div>
        </article>
    </main>

    <footer>
        <div class="skeleton skeleton-footer-text"></div>
    </footer>
</body>
</html>
